name: Deploy frontend to GitHub Pages

# Compile le moteur C en WebAssembly (Emscripten) puis déploie le dossier web/
# (site + engine.js/engine.wasm) sur GitHub Pages.
#
# Les artefacts WASM ne sont pas versionnés : ils sont régénérés ici à chaque
# déploiement à partir des sources src/.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'src/**'
      - 'Makefile'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule exécution de déploiement à la fois ; ne pas annuler un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Installe Emscripten et compile le moteur en WASM (web/engine.js + .wasm).
      # Tout dans un même step : emsdk_env.sh doit être sourcé dans le shell qui
      # invoque emcc.
      - name: Build WebAssembly engine
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
          cd "$HOME/emsdk"
          ./emsdk install latest
          ./emsdk activate latest
          source ./emsdk_env.sh
          cd "$GITHUB_WORKSPACE"
          make wasm
          test -f web/engine.js && test -f web/engine.wasm

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Active GitHub Pages automatiquement si ce n'est pas déjà fait.
          enablement: true

      - name: Upload site (web/ + artefacts WASM)
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
